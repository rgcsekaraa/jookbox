services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: isaibox-local-backend
    environment:
      ISAIBOX_LOCAL_MODE: "1"
      ISAIBOX_HOST: "0.0.0.0"
      ISAIBOX_PORT: "6060"
      ISAIBOX_LOG_LEVEL: "info"
      ISAIBOX_WORKERS: "1"
      DUCKDB_PATH: "/app/shared-data/masstamilan.duckdb"
      ISAIBOX_BUNDLED_DUCKDB_PATH: "/app/bundled-data/masstamilan.duckdb"
      ISAIBOX_CACHE_LIMIT_GB: "${ISAIBOX_CACHE_LIMIT_GB:-20}"
      ISAIBOX_DB_SYNC_ENABLED: "${ISAIBOX_DB_SYNC_ENABLED:-1}"
      ISAIBOX_DB_SYNC_MANIFEST_URL: "${ISAIBOX_DB_SYNC_MANIFEST_URL:-https://raw.githubusercontent.com/rgcsekaraa/isaibox/main/packages/isaibox-local/app/data/library-manifest.json}"
      ISAIBOX_DB_SYNC_INTERVAL_SECONDS: "${ISAIBOX_DB_SYNC_INTERVAL_SECONDS:-1800}"
    volumes:
      - ../../data:/app/shared-data
      - ./app/data:/app/data
      - ./app/exports:/app/exports
      - ./app/.cache:/app/.cache
    restart: unless-stopped
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: isaibox-local-frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-6789}:5173"
    restart: unless-stopped

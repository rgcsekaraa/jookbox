name: Refresh DuckDB Library

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Scrape mode passed to run_standalone.py"
        required: false
        default: "all"
      full_scan:
        description: "Run in full scan mode"
        required: false
        default: "true"
      delay:
        description: "Delay between page fetches"
        required: false
        default: "1.3"
      publish_ref:
        description: "Git ref used in raw download URLs and push target"
        required: false
        default: "main"
permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-library
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.publish_ref || 'main' }}
          fetch-depth: 0

      - name: Define retry helper
        shell: bash
        run: |
          cat > /tmp/retry.sh <<'EOF'
          retry() {
            local attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local n=1
            while true; do
              "$@" && break
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after $n attempt(s): $*"
                return 1
              fi
              echo "Attempt $n failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              n=$((n + 1))
            done
          }
          EOF

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install scraper dependencies
        shell: bash
        run: |
          source /tmp/retry.sh
          retry 3 20 python -m pip install --upgrade pip
          retry 3 30 python -m pip install -r packages/isaibox-local/requirements-local.txt

      - name: Ensure data directories exist
        run: mkdir -p data exports packages/isaibox-local/app/data

      - name: Download current published DB
        shell: bash
        run: |
          DOWNLOAD_URL="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("packages/isaibox-local/app/data/library-manifest.json").read_text())
          print(manifest["download_url"])
          PY
          )"
          curl -fL --retry 3 --retry-delay 20 \
            -o packages/isaibox-local/app/data/masstamilan.duckdb \
            "${DOWNLOAD_URL}"

      - name: Back up current published DB
        uses: actions/upload-artifact@v5
        with:
          name: duckdb-backup-${{ github.run_id }}
          path: packages/isaibox-local/app/data/masstamilan.duckdb
          retention-days: 30

      - name: Run scraper
        shell: bash
        env:
          INPUT_SCAN_MODE: ${{ github.event.inputs.scan_mode || 'all' }}
          INPUT_FULL_SCAN: ${{ github.event.inputs.full_scan || 'true' }}
          INPUT_DELAY: ${{ github.event.inputs.delay || '1.3' }}
        run: |
          source /tmp/retry.sh
          if [ "${INPUT_FULL_SCAN}" = "true" ]; then
            FULL_FLAG="--full"
          else
            FULL_FLAG=""
          fi
          retry 2 120 python run_standalone.py --mode "${INPUT_SCAN_MODE}" --delay "${INPUT_DELAY}" ${FULL_FLAG}

      - name: Publish packaged DuckDB and manifest
        env:
          INPUT_PUBLISH_REF: ${{ github.event.inputs.publish_ref || 'main' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/publish_library.py \
            --db-path data/masstamilan.duckdb \
            --output-db packages/isaibox-local/app/data/masstamilan.duckdb \
            --manifest packages/isaibox-local/app/data/library-manifest.json \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${INPUT_PUBLISH_REF}" \
            --version "${VERSION}"
          gh release upload local-library \
            packages/isaibox-local/app/data/masstamilan.duckdb#masstamilan.duckdb \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
          python - <<'PY'
          import json
          from pathlib import Path
          manifest_path = Path("packages/isaibox-local/app/data/library-manifest.json")
          manifest = json.loads(manifest_path.read_text())
          manifest["download_url"] = "https://github.com/${{ github.repository }}/releases/download/local-library/masstamilan.duckdb"
          manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n")
          PY

      - name: Detect repository changes
        id: changes
        run: |
          if git diff --quiet -- packages/isaibox-local/app/data/library-manifest.json; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit refreshed library
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/isaibox-local/app/data/library-manifest.json
          git commit -m "chore(data): refresh DuckDB library"

      - name: Push refreshed library
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          PUBLISH_REF: ${{ github.event.inputs.publish_ref || 'main' }}
        run: |
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${PUBLISH_REF}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; rebasing onto origin/${PUBLISH_REF}."
            git fetch origin "${PUBLISH_REF}"
            git rebase "origin/${PUBLISH_REF}"
            sleep 5
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1

      - name: Summarize
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "DuckDB snapshot changed and was pushed."
          else
            echo "DuckDB snapshot unchanged; nothing pushed."
          fi
